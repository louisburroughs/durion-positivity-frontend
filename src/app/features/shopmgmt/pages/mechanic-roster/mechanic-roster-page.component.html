<section>
  <header class="page-header">
    <h1>Mechanic Roster</h1>
  </header>

  <div class="roster-controls">
    <button class="open-create-btn" type="button" (click)="openCreateModal()">Create employee</button>
  </div>

  <p class="success-banner" *ngIf="createSuccess()">Employee created.</p>
  <p class="error-banner" *ngIf="error() || createError()">{{ error() || createError() }}</p>

  <div class="roster-table" *ngIf="!loading() && people().length > 0">
    <div class="roster-row" *ngFor="let person of people()">{{ getDisplayName(person) }}</div>
  </div>

  <p class="empty-state" *ngIf="!loading() && !error() && people().length === 0">No people found.</p>

  <div class="create-modal-overlay" *ngIf="showCreateModal()">
    <form [formGroup]="createForm" (ngSubmit)="submitCreateEmployee()">
      <div class="form-group">
        <label>First name <input type="text" formControlName="firstName" /></label>
      </div>
      <div class="form-group">
        <label>Last name <input type="text" formControlName="lastName" /></label>
      </div>
      <div class="form-group">
        <label>Email <input type="email" formControlName="email" /></label>
      </div>
      <div class="form-group">
        <label>Role <input type="text" formControlName="role" /></label>
      </div>

      <button class="submit-create-btn" type="submit">Save</button>
      <button type="button" (click)="closeCreateModal()">Close</button>
    </form>
  </div>
</section>
