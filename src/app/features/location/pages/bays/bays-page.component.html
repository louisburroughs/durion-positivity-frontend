<section class="page-header">
  <h2>{{ 'LOCATION.BAYS.TITLE' | translate }}</h2>
  <button type="button" class="btn-primary open-create-btn" (click)="openCreate()">{{ 'LOCATION.BAYS.CREATE_BAY' | translate }}</button>
</section>

<div *ngIf="error()" class="error-banner">{{ error()! | translate }}</div>

<section *ngIf="loading(); else baysContent" class="bays-grid">
  <p>{{ 'LOCATION.BAYS.LOADING' | translate }}</p>
</section>

<ng-template #baysContent>
  <section *ngIf="bays().length > 0; else emptyState" class="bays-grid">
    <button *ngFor="let bay of bays()" type="button" class="bay-card" (click)="selectBay(bay)">
      <h3>{{ getBayName(bay) }}</h3>
    </button>
  </section>
</ng-template>

<ng-template #emptyState>
  <section class="empty-state">
    <p>{{ 'LOCATION.BAYS.EMPTY' | translate }}</p>
  </section>
</ng-template>

<div *ngIf="showCreateModal()" class="create-modal-overlay">
  <section class="create-modal">
    <h3>{{ 'LOCATION.BAYS.CREATE_BAY' | translate }}</h3>

    <div class="form-group">
      <label for="create-bay-name">{{ 'LOCATION.BAYS.BAY_NAME' | translate }}</label>
      <input id="create-bay-name" type="text" [value]="createBayName()"
        (input)="createBayName.set($any($event.target).value)" />
    </div>

    <div class="modal-actions">
      <button type="button" class="btn-secondary" (click)="closeCreate()">{{ 'LOCATION.BAYS.CANCEL' | translate }}</button>
      <button type="button" class="btn-primary submit-create-btn" (click)="submitCreate()">{{ 'LOCATION.BAYS.CREATE' | translate }}</button>
    </div>
  </section>
</div>

<div *ngIf="showEditModal()" class="edit-modal-overlay">
  <section class="edit-modal">
    <h3>{{ 'LOCATION.BAYS.EDIT_BAY' | translate }}</h3>

    <div class="form-group">
      <label for="edit-bay-name">{{ 'LOCATION.BAYS.BAY_NAME' | translate }}</label>
      <input id="edit-bay-name" type="text" [value]="editBayName()"
        (input)="editBayName.set($any($event.target).value)" />
    </div>

    <div class="modal-actions">
      <button type="button" class="btn-secondary" (click)="closeEdit()">{{ 'LOCATION.BAYS.CANCEL' | translate }}</button>
      <button type="button" class="btn-primary" (click)="submitEdit()">{{ 'LOCATION.BAYS.SAVE' | translate }}</button>
    </div>
  </section>
</div>
