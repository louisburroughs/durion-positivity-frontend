<section class="page-header">
  <h2>Bays</h2>
  <button type="button" class="btn-primary open-create-btn" (click)="openCreate()">Create Bay</button>
</section>

<div *ngIf="error()" class="error-banner">{{ error() }}</div>

<section *ngIf="loading(); else baysContent" class="bays-grid">
  <p>Loading...</p>
</section>

<ng-template #baysContent>
  <section *ngIf="bays().length > 0; else emptyState" class="bays-grid">
    <button *ngFor="let bay of bays()" type="button" class="bay-card" (click)="selectBay(bay)">
      <h3>{{ getBayName(bay) }}</h3>
    </button>
  </section>
</ng-template>

<ng-template #emptyState>
  <section class="empty-state">
    <p>No bays found for this location.</p>
  </section>
</ng-template>

<div *ngIf="showCreateModal()" class="create-modal-overlay">
  <section class="create-modal">
    <h3>Create Bay</h3>

    <div class="form-group">
      <label for="create-bay-name">Bay Name</label>
      <input id="create-bay-name" type="text" [value]="createBayName()"
        (input)="createBayName.set($any($event.target).value)" />
    </div>

    <div class="modal-actions">
      <button type="button" class="btn-secondary" (click)="closeCreate()">Cancel</button>
      <button type="button" class="btn-primary submit-create-btn" (click)="submitCreate()">Create</button>
    </div>
  </section>
</div>

<div *ngIf="showEditModal()" class="edit-modal-overlay">
  <section class="edit-modal">
    <h3>Edit Bay</h3>

    <div class="form-group">
      <label for="edit-bay-name">Bay Name</label>
      <input id="edit-bay-name" type="text" [value]="editBayName()"
        (input)="editBayName.set($any($event.target).value)" />
    </div>

    <div class="modal-actions">
      <button type="button" class="btn-secondary" (click)="closeEdit()">Cancel</button>
      <button type="button" class="btn-primary" (click)="submitEdit()">Save</button>
    </div>
  </section>
</div>
