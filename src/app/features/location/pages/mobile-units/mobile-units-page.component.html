<section class="page-header">
  <h2>Mobile Units</h2>
  <button type="button" class="btn-primary open-create-btn" (click)="openCreate()">Create Mobile Unit</button>
</section>

<div *ngIf="error()" class="error-banner">{{ error() }}</div>

<section *ngIf="loading(); else unitsContent" class="units-list">
  <p>Loading...</p>
</section>

<ng-template #unitsContent>
  <section *ngIf="mobileUnits().length > 0; else emptyState" class="units-list">
    <article *ngFor="let unit of mobileUnits()" class="unit-card">
      <h3>{{ getUnitName(unit) }}</h3>
      <button type="button" class="btn-secondary" (click)="openCoverage(unit)">Coverage Rules</button>
    </article>
  </section>
</ng-template>

<ng-template #emptyState>
  <section class="empty-state">
    <p>No mobile units found.</p>
  </section>
</ng-template>

<div *ngIf="showCreateModal()" class="create-modal-overlay">
  <section class="create-modal">
    <h3>Create Mobile Unit</h3>

    <div class="form-group">
      <label for="mobile-unit-name">Name</label>
      <input id="mobile-unit-name" type="text" [value]="createName()"
        (input)="createName.set($any($event.target).value)" />
    </div>

    <div class="modal-actions">
      <button type="button" class="btn-secondary" (click)="closeCreate()">Cancel</button>
      <button type="button" class="btn-primary submit-create-btn" (click)="submitCreate()">Create</button>
    </div>
  </section>
</div>

<div *ngIf="showCoverageModal()" class="coverage-modal-overlay">
  <section class="coverage-modal">
    <h3>Coverage Rules</h3>

    <div class="form-group">
      <label for="coverage-region">Region</label>
      <input id="coverage-region" type="text" [value]="coverageRegion()"
        (input)="coverageRegion.set($any($event.target).value)" />
    </div>

    <div class="modal-actions">
      <button type="button" class="btn-secondary" (click)="closeCoverage()">Cancel</button>
      <button type="button" class="btn-primary" (click)="submitCoverageRules()">Save</button>
    </div>
  </section>
</div>
