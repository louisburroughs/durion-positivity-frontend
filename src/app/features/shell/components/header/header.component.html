<header class="shell-header" role="banner">

  <!-- Left: hamburger + logo -->
  <div class="header-start">
    <button
      class="nav-toggle-btn"
      type="button"
      (click)="toggleNav()"
      [attr.aria-label]="'SHELL.HEADER.NAV_TOGGLE_ARIA' | translate"
      [title]="'SHELL.HEADER.NAV_TOGGLE_TITLE' | translate"
    >
      <span class="hamburger-icon" aria-hidden="true">☰</span>
    </button>
    <span class="brand-wordmark">Durion POS</span>
  </div>

  <!-- Right: theme toggle + user info -->
  <div class="header-end">
    <label class="sr-only" for="locale-select">{{ 'SHELL.HEADER.LOCALE.LABEL' | translate }}</label>
    <select
      id="locale-select"
      class="locale-select"
      [value]="localeService.currentLocale()"
      (change)="setLocale($any($event.target).value)"
      [attr.aria-label]="'SHELL.HEADER.LOCALE.ARIA' | translate"
    >
      @for (locale of localeOptions; track locale.code) {
        <option [value]="locale.code">{{ locale.labelKey | translate }}</option>
      }
    </select>

    <button
      class="icon-btn"
      type="button"
      (click)="themeService.toggle()"
      [attr.aria-label]="themeService.isDark() ? ('SHELL.HEADER.THEME_TO_LIGHT' | translate) : ('SHELL.HEADER.THEME_TO_DARK' | translate)"
      [title]="themeService.isDark() ? ('SHELL.HEADER.THEME_TO_LIGHT' | translate) : ('SHELL.HEADER.THEME_TO_DARK' | translate)"
    >
      {{ themeService.isDark() ? '☀️' : '🌙' }}
    </button>

    <div class="user-chip" [attr.aria-label]="'SHELL.HEADER.USER_CHIP_ARIA' | translate">
      <span class="user-avatar" aria-hidden="true">{{ username.charAt(0).toUpperCase() }}</span>
      <span class="user-name">{{ username }}</span>
    </div>

    <button
      class="icon-btn logout-btn"
      type="button"
      (click)="logout()"
      [attr.aria-label]="'SHELL.HEADER.SIGN_OUT' | translate"
      [title]="'SHELL.HEADER.SIGN_OUT' | translate"
    >
      ⏻
    </button>
  </div>

</header>
