<section>
  <header class="page-header">
    <h1>Security Audit Log</h1>
  </header>

  <form class="filter-form" (ngSubmit)="loadAudit(appointmentId())">
    <label>
      Appointment ID
      <input type="text" [value]="appointmentId()" (input)="appointmentId.set(($any($event.target)).value)" />
    </label>
    <button type="submit">Load</button>
  </form>

  <p class="error-banner" *ngIf="error()">{{ error() }}</p>

  <div class="audit-list" *ngIf="!loading() && auditEntries().length > 0">
    <div class="audit-entry" *ngFor="let entry of auditEntries()">
      <button type="button" (click)="viewEntry(entry)">View entry</button>
      <span>{{ entry | json }}</span>
    </div>
  </div>

  <div class="audit-detail" *ngIf="selectedEntry()">{{ selectedEntry() | json }}</div>

  <p class="empty-state" *ngIf="!loading() && !error() && auditEntries().length === 0">No audit entries found.</p>
</section>
