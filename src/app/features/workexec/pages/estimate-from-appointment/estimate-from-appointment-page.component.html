<section>
  <header class="page-header">
    <h1>Create Estimate From Appointment</h1>
  </header>

  <form class="estimate-form" [formGroup]="estimateForm" (ngSubmit)="submit()">
    <div class="form-group">
      <label>Appointment ID <input type="text" formControlName="appointmentId" /></label>
    </div>
    <div class="form-group">
      <label>Workorder ID <input type="text" formControlName="workorderId" /></label>
    </div>
    <div class="form-group">
      <label>Notes <textarea formControlName="notes"></textarea></label>
    </div>

    <button class="submit-btn" type="submit" [disabled]="estimateForm.controls.appointmentId.value.trim().length === 0 || loading()">Create estimate</button>
  </form>

  <p class="success-banner" *ngIf="createSuccess()">Estimate created.</p>
  <p class="error-banner" *ngIf="createError()">{{ createError() }}</p>
</section>
