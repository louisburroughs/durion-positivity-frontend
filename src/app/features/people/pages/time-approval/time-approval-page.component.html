<section>
  <header class="page-header">
    <h1>{{ 'PEOPLE.TIME_APPROVAL.TITLE' | translate }}</h1>
  </header>

  <div class="bulk-actions">
    <button class="approve-btn" type="button" (click)="approveSelected()">{{ 'PEOPLE.TIME_APPROVAL.APPROVE' | translate }}</button>
    <button class="reject-btn" type="button" (click)="openRejectModal()">{{ 'PEOPLE.TIME_APPROVAL.REJECT' | translate }}</button>
  </div>

  <p class="success-banner" *ngIf="approveSuccess() || rejectSuccess()">{{ 'PEOPLE.TIME_APPROVAL.ACTION_COMPLETED' | translate }}</p>
  <p class="error-banner" *ngIf="approveError() || rejectError()">{{ (approveError() || rejectError())! | translate }}</p>

  <div class="entry-list" *ngIf="!loading() && timeEntries().length > 0">
    <div class="entry-row" *ngFor="let entry of timeEntries()">
      <input class="entry-checkbox" type="checkbox" [checked]="selectedEntries().includes(getEntryId(entry))"
        (change)="toggleEntry(getEntryId(entry))" />
      <div class="entry-details">{{ getEntryId(entry) }}</div>
    </div>
  </div>

  <p class="empty-state" *ngIf="!loading() && !approveError() && timeEntries().length === 0">{{ 'PEOPLE.TIME_APPROVAL.EMPTY' | translate }}</p>

  <div class="reject-modal-overlay" *ngIf="showRejectModal()">
    <label>
      {{ 'PEOPLE.TIME_APPROVAL.REASON' | translate }}
      <textarea class="reject-reason-field" [value]="rejectReason()"
        (input)="rejectReason.set(($any($event.target)).value)"></textarea>
    </label>
    <button type="button" (click)="submitReject()">{{ 'PEOPLE.TIME_APPROVAL.SUBMIT_REJECT' | translate }}</button>
    <button type="button" (click)="closeRejectModal()">{{ 'PEOPLE.TIME_APPROVAL.CLOSE' | translate }}</button>
  </div>
</section>
