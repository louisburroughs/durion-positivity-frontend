name: Accessibility Dry Run

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  accessibility-dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run accessibility smoke scan (non-blocking)
        id: a11y_scan
        continue-on-error: true
        run: npm run a11y:smoke

      - name: Upload accessibility smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-smoke-report
          path: artifacts/a11y/smoke-report.json
          if-no-files-found: warn

      - name: Dry-run summary
        if: always()
        run: |
          if [ "${{ steps.a11y_scan.outcome }}" = "success" ]; then
            echo "Accessibility dry run passed at configured threshold."
          else
            echo "Accessibility dry run reported issues or failed to execute. This is non-blocking by design in dry-run mode."
          fi
